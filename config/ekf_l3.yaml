# L3: Sensor Fusion (Leg Odometry + IMU + KISS-ICP)
ekf_filter_node_l3:
  ros__parameters:
    use_sim_time: true
    frequency: 50.0
    sensor_timeout: 0.2
    two_d_mode: true 
    transform_time_offset: 0.2
    transform_timeout: 0.3
    print_diagnostics: true
    debug: false
    publish_tf: true 

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /robot/base/odom
    odom0_config: [true,  true,  false,  
                   false, false, false,   
                   false, false, false, 
                   false, false, false,  
                   false, false, false]
    odom0_differential: true             

    # imu0: Unitree IMU (L2 Overlay)
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, false,  
                  false, false, false,
                  false, false, true,    
                  false, false, true]  
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 10
    imu0_nodelay: false
    imu0_remove_gravitational_acceleration: true

    odom1: /kiss/odometry
    odom1_config: [true,  false,  false,  
                   false, false, true,   
                   true,  false, false,  
                   false, false, false,
                   false, false, false]
    odom1_differential: false
    odom1_relative: false
    odom1_queue_size: 10
    odom1_nodelay: false
    odom1_pose_rejection_threshold: 2.5
    odom1_twist_rejection_threshold: 2.5

